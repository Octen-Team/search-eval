name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Compile check
        run: python -m py_compile src/*.py scripts/*.py
      - name: Unit tests (fully mocked, no API keys needed)
        run: python -m pytest tests/ -q
# Note: the anchor regression gate (scripts/anchor_gate.py) is meant to be wired into the
# ENGINE's release pipeline: run run_eval --skip-judge on the anchor set against the release
# candidate, then `python -m scripts.anchor_gate --run <new> --baseline <last-good>`;
# a non-zero exit blocks the release.
